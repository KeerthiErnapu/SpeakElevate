<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Practice</title>
    <style>
        /* Reset default styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        /* Container styling */
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        p {
            font-size: 1.2em;
            color: #f0f0f0;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .button {
            padding: 15px 30px;
            font-size: 1.1em;
            background-color: #0078d7;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        .button:hover {
            background-color: #005fa3;
            transform: translateY(-5px);
        }

        .button:active {
            background-color: #003f75;
        }

        a {
            text-decoration: none;
            font-size: 1.1em;
            color: #ffffff;
            margin-top: 20px;
            display: inline-block;
            transition: color 0.3s;
        }

        a:hover {
            color: #00c6ff;
        }

        .link-section {
            margin-top: 40px;
            font-size: 1.2em;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .button {
                padding: 12px 24px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SQL Practice</h1>
        <p>Choose the difficulty level for SQL problems:</p>

        <div class="buttons">
            <button class="button" onclick="window.location.href='/sql/easy'">Easy</button>
            <button class="button" onclick="window.location.href='/sql/moderate'">Moderate</button>
            <button class="button" onclick="window.location.href='/sql/hard'">Hard</button>
        </div>

        <a href="/technical-practice">Back to Technical Practice</a>

        <div class="link-section">
            <p>For additional practice and learning, visit the following:</p>
            <a href="https://www.geeksforgeeks.org/sql-tutorial/" target="_blank">GeeksforGeeks SQL Tutorial</a><br>
            <a href="https://www.programiz.com/sql" target="_blank">Programiz SQL Tutorial</a>

        </div>
    </div>
</body>
</html>
